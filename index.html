<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@mythicalstories | The Archive</title>
    <style>
        /* Modern Mystical Theme */
        :root {
            --gold: #d4af37;
            --bg: #0a0a0a;
            --surface: #161616;
            --text: #e0e0e0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Cinzel', serif; /* Elegant, classic feel */
            margin: 0;
            line-height: 1.6;
        }

        /* Header */
        header {
            padding: 30px 10%;
            text-align: center;
            border-bottom: 1px solid var(--gold);
        }

        .logo { font-size: 2rem; color: var(--gold); letter-spacing: 4px; text-transform: uppercase; }

        /* Video Styling */
        .video-container {
            padding: 60px 10%;
            text-align: center;
        }

        .youtube-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            max-width: 800px;
            margin: 20px auto;
            border: 2px solid var(--gold);
            border-radius: 8px;
        }

        .youtube-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Button Style */
        .yt-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: var(--gold);
            color: black;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
        }

        .yt-link:hover { transform: scale(1.05); background: #fff; }
    </style>
</head>
<body>

    <header>
        <div class="logo">@mythicalstories</div>
    </header>

    <!-- YouTube Section -->
    <section class="video-container">
        <h2>Latest Mythical Feature</h2>
        <div class="youtube-wrapper">
            <!-- REPLACE THE SRC LINK BELOW WITH YOUR VIDEO ID -->
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
                    title="Mythical Story Video" 
                    allowfullscreen>
            </iframe>
        </div>
        <a href="https://youtube.com/@YOUR_CHANNEL_HANDLE" class="yt-link" target="_blank">
            Subscribe on YouTube
        </a>
    </section>

</body>
</html>
